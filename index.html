<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visiting Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      width: 350px;
      height: 200px;
      background: linear-gradient(135deg, #007bff, #00c6ff);
      color: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #007bff;
      font-weight: bold;
    }

    .name {
      font-size: 20px;
      font-weight: bold;
    }

    .title {
      font-size: 14px;
      opacity: 0.9;
    }

    .bottom {
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="top">
      <div>
        <div class="name">Malik Arshad</div>
        <div class="title">Frontend Developer</div>
      </div>
      <div class="logo">MA</div>
    </div>

    <div class="bottom">
      <span>📞 +92 300 2427705</span>
    </div>
  </div>

</body>
</html>
